name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-formula:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install formula
        run: brew install geekjourneyx/tap/md2wechat

      - name: Smoke formula binary
        run: md2wechat version --json
